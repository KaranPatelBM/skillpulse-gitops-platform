apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: skillpulse-prod
  labels:
    app: backend
    environment: prod

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
        environment: prod

    spec:
      containers:
        - name: backend

          image: karanpatelbm2000/skillpulse-backend:v1.0.0

          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080

          envFrom:
            - configMapRef:
                name: backend-config

          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: user

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database

          resources:
            requests:
              memory: 128Mi
              cpu: 100m

            limits:
              memory: 512Mi
              cpu: 1000m

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5