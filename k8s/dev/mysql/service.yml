apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: skillpulse-dev
  labels:
    app: mysql
    environment: dev
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: skillpulse
    app.kubernetes.io/environment: dev

  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  type: ClusterIP
  ports:
    - port: 3306
      protocol: TCP
      targetPort: mysql
      name: mysql
  selector:
    app: mysql