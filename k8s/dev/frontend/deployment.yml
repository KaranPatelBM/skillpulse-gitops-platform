apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: skillpulse-dev
  labels:
    app: frontend
    environment: dev
  
spec:
  replicas: 1
  selector:
    matchlabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
        environment: dev

    spec:
      containers:
        - name: frontend
          image: karanpatelbm2000/skillpulse-backend:main-a12bc34
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              memory: 32Mi
              cpu: 20m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5              