apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: skillpulse-dev
  labels:
    app: backend
    environment: dev

    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: skillpulse
    app.kubernetes.io/component: api
    app.kubernetes.io/environment: dev

  annotations:
    argocd.argoproj.io/sync-wave: "1"

spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
      protocol: TCP
  selector:
    app: backend
